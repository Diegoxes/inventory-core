spring:
  datasource:
    # JDBC local armado así para no usar `\:` dentro de YAML (SnakeYAML no lo acepta en comillas").
    # Cada `${VAR:def}` usa un default sin `:` en el lado derecho → sin ambigüedad con Spring.
    # Producción (Render, etc.): define SPRING_DATASOURCE_URL con el JDBC completo; suele pisa este valor por precedencia del entorno.
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:smarthome_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Poolers (Supabase 6543, PgBouncer modo transacción): evita server-side prepared statements
      data-source-properties:
        prepareThreshold: 0

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8084}
  servlet:
    context-path: /api
  forward-headers-strategy: framework

jwt:
  # En producción usa JWT_SECRET largo (≥32 caracteres ASCII recomendado). Valores cortos se hashean con SHA-256 al vuelo.
  secret: ${JWT_SECRET:smarthome-shopper-dev-only-32chars-min!}
  expiration: 86400000

azure:
  ai:
    foundry:
      base-url: ${AZURE_AI_FOUNDRY_BASE_URL:https://diegox-2000-5595-resource.services.ai.azure.com/openai/v1}
      api-key: ${AZURE_AI_FOUNDRY_API_KEY:}
      deployment: ${AZURE_AI_FOUNDRY_DEPLOYMENT:gpt-4o}
      temperature: ${AZURE_AI_FOUNDRY_TEMPERATURE:0.2}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

logging:
  level:
    com.smarthome: DEBUG
    org.springframework.security: WARN

# Mantenimiento: al activarlo (o desde panel PLATFORM_OWNER), solo usuarios con rol PLATFORM_OWNER pueden usar la API.
app:
  internal:
    token: ${APP_INTERNAL_TOKEN:dev-internal-token-change-me}
  maintenance:
    enabled: ${APP_MAINTENANCE_ENABLED:false}
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  features:
    ai:
      enabled: ${APP_FEATURES_AI_ENABLED:true}
  s3:
    bucket: ${APP_S3_BUCKET:}
    public-base-url: ${APP_S3_PUBLIC_BASE_URL:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# CORS: el backend acepta cualquier origen (configuración permisiva; restringe en prod si lo necesitas).